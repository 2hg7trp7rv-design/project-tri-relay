name: TRI RELAY Quality Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tri-relay-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test Sites and game engine
        run: npm test

      - name: Verify native Vercel build
        run: npm run verify:vercel

      - name: Check release artifact policy
        run: npm run check:release

      - name: Run bounded strategy simulation
        run: npm run simulate
        env:
          SIMULATION_RUNS: "200"
